<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;"
    />
    <title>Mini Guild Idle</title>
    <!-- PWA: instalável e offline no celular/navegador (ignorado no Electron). -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#10151e" />
    <link rel="icon" type="image/png" href="./icon-256.png" />
    <link rel="apple-touch-icon" href="./icon-256.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- iOS PWA splash screens -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="./splash/splash-iphone-se.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="./splash/splash-iphone-6-7-8.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="./splash/splash-iphone-x.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="./splash/splash-iphone-xs-max.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="./splash/splash-iphone-12-13.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="./splash/splash-iphone-12-13-pro-max.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="./splash/splash-ipad.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="./splash/splash-ipad-pro.png" />
    <script type="module" crossorigin src="./assets/index-DJl3nvuI.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/i18n-BDkTRLfY.js">
    <link rel="modulepreload" crossorigin href="./assets/uniques-D0c3dLqb.js">
    <link rel="stylesheet" crossorigin href="./assets/index-DOI5e8Oz.css">
  </head>
  <body class="mode-compact">
    <div id="app-row">
    <div id="app">
      <div id="log-ticker" title="Clique para expandir/recolher o histórico">—</div>
      <section id="combat">
        <canvas id="combat-canvas"></canvas>
         <button id="btn-toggle-farm" class="farm-toggle" title="Auto-repetir fase: Off" aria-label="Auto-repetir fase">↻</button>
         <button id="btn-toggle-mode" class="mode-toggle" title="Expandir"></button>
      </section>

      <section id="compact-hud" class="hud">
        <div class="hud-row">
          <span id="hud-stage">Fase 1-1 • 0/6</span>
          <span id="hud-lastdrop" class="dim">—</span>
        </div>
      </section>

      <section id="expanded-panel">
        <nav id="tabs">
          <button class="tab active" data-tab="base" title="Guilda: inventário e equipamento"><i>🏠</i><span>Início</span></button>
          <button class="tab" data-tab="mapa" title="Mapa: fases, dificuldades e bestiário"><i>🗺</i><span>Mapa</span></button>
          <button class="tab" data-tab="hero" title="Heróis: atributos e skills"><i>♟</i><span>Heróis</span></button>
          <button class="tab" data-tab="objetivos" title="Objetivos: quests, missões do dia e conquistas"><i>🎯</i><span>Objetivos</span></button>
          <button class="tab" data-tab="pets" title="Pets: equipamento e skills"><i>🐾</i><span>Pets</span></button>
          <button class="tab" data-tab="runas" title="Runas: bônus permanentes"><i>✦</i><span>Runas</span></button>
          <button class="tab" data-tab="guild" title="Guild Master: ranks, missões, gestão da guilda"><i>🏰</i><span>Guilda</span></button>
          <button class="tab" data-tab="aventura" title="Aventura: modo side-scroll manual, difícil e limitado por dia"><i>🕹</i><span>Aventura</span></button>
          <span class="tab-spacer"></span>
          <button id="btn-float-chest" class="tab float-toggle" title="Abrir o Baú (tela dividida)"><i>🧰</i><span>Baú</span></button>
          <button id="btn-float-craft" class="tab float-toggle" title="Abrir o Cubo (tela cheia)"><i>◆</i><span>Cubo</span></button>
          <button class="tab" data-tab="settings" title="Configurações"><i>⚙</i><span>Config</span></button>
        </nav>
        <div id="tab-content"></div>
      </section>

      <!-- Overlay do Baú: tela dividida inventário + baú -->
      <div id="overlay-chest" class="app-overlay hidden">
        <div class="app-overlay-head">
          <span>🧰 Baú</span>
          <button class="btn-icon app-overlay-close">✕</button>
        </div>
        <div id="overlay-chest-body" class="app-overlay-body"></div>
      </div>

      <!-- Overlay do Cubo: tela cheia -->
      <div id="overlay-craft" class="app-overlay hidden">
        <div class="app-overlay-head">
          <span>◆ Cubo</span>
          <button class="btn-icon app-overlay-close">✕</button>
        </div>
        <div id="overlay-craft-body" class="app-overlay-body"></div>
      </div>
    </div>
    </div>

    <!-- Modal genérico (offline / confirmações) -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-box">
        <div id="modal-content"></div>
      </div>
    </div>

  </body>
</html>
